services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-challenge-app:latest
    env_file:
      - /opt/rag-challenge/.env
    restart: unless-stopped
    volumes:
      - rag_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: docker.m.daocloud.io/nginx:1.27-alpine
    depends_on:
      - app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./deploy/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  rag_data:
